<button type="button" class="ge-chart-dock-pill ge-onboarding-target" id="geChartDockPill" aria-expanded="true" aria-controls="main" title="Ocultar o mostrar paneles de gráficos">
  <span class="ge-chart-dock-pill__text ge-chart-dock-pill__text--hide">Ocultar gráficos</span>
  <span class="ge-chart-dock-pill__text ge-chart-dock-pill__text--show">Mostrar gráficos</span>
</button>
<script>
(function () {
  var KEY = 'ge-charts-collapsed';
  var body = document.body;
  var btn = document.getElementById('geChartDockPill');
  if (!btn) return;
  function apply(collapsed) {
    body.classList.toggle('genius-explorer--charts-collapsed', collapsed);
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    try {
      localStorage.setItem(KEY, collapsed ? '1' : '0');
    } catch (e) {}
  }
  btn.addEventListener('click', function () {
    if (body.classList.contains('genius-explorer--chart-dock-disabled')) return;
    apply(!body.classList.contains('genius-explorer--charts-collapsed'));
  });
  try {
    if (localStorage.getItem(KEY) === '1') apply(true);
  } catch (e) {}
  window.setGeExplorerChartDockEnabled = function (enabled) {
    body.classList.toggle('genius-explorer--chart-dock-disabled', !enabled);
    if (!enabled) {
      btn.setAttribute('aria-hidden', 'true');
      btn.setAttribute('tabindex', '-1');
    } else {
      btn.removeAttribute('aria-hidden');
      btn.removeAttribute('tabindex');
      btn.setAttribute('aria-expanded', body.classList.contains('genius-explorer--charts-collapsed') ? 'false' : 'true');
    }
  };
})();
</script>

<script>
(function () {
  function syncGeTopbarHeight() {
    var sidebar = document.querySelector('.ge-sidebar');
    if (!sidebar) return;
    var rect = sidebar.getBoundingClientRect();
    /* Sin cabecera central: respiro superior alineado al panel lateral (safe-area) */
    var clearance = Math.round(rect.top) + 10;
    document.documentElement.style.setProperty('--ge-topbar-overlay-h', clearance + 'px');
    var midY = Math.round(rect.top + 28);
    document.documentElement.style.setProperty('--ge-topbar-center-y', midY + 'px');
  }
  function init() {
    syncGeTopbarHeight();
    var sidebar = document.querySelector('.ge-sidebar');
    if (sidebar && typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(syncGeTopbarHeight).observe(sidebar);
    }
    window.addEventListener('resize', syncGeTopbarHeight);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(syncGeTopbarHeight);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  requestAnimationFrame(syncGeTopbarHeight);
})();
</script>

    } catch (err) { /* noop */ }
    try {

        window.__geniusNdviBarriosTour = null;
    } catch (e2) { /* noop */ }
    try {
        var m = window.mapInstance;
        if (m && typeof m.then !== 'function' && typeof m.remove === 'function') {
            m.remove();
        }
    } catch (err) { /* noop */ }
    window.mapInstance = null;
}

function scheduleMapLayoutRefresh(type) {
    if (typeof window.geniusRunMapLayoutRefresh === 'function') {
        window.geniusRunMapLayoutRefresh(type);
        return;
    }
    function run() {
        try {
            var m = window.mapInstance;
            if (!m) return;
            if (typeof m.invalidateSize === 'function') {
                m.invalidateSize({ animate: false });
            }
            if (typeof m.resize === 'function') {
                m.resize();
            }
        } catch (err) { /* noop */ }
    }
    setTimeout(run, 200);
    setTimeout(run, 700);
}

  <script>
    (function bootExplorer() {
      var bootDone = false;
      function tryStart() {
        try {
          /* text_ndvi viene de index2-explorer-text.js (módulo aparte). Si maps listo antes que textos,
             toggleTable llama window.text_ndvi y falla — típico en web con red lenta o sin caché. */
          if (
            typeof window.map_ndvi === 'function' &&
            typeof window.toggleNDVIButtons === 'function' &&
            typeof window.text_ndvi === 'function'
          ) {
            if (bootDone) return true;
            bootDone = true;
            window.toggleNDVIButtons();
            return true;
          }
        } catch (e) {
          console.error('[GENIUS bootExplorer] toggleNDVIButtons failed:', e);
        }
        return false;
      }
      function scheduleFallbackPoll() {
        var n = 0;
        var t = setInterval(function () {
          n += 1;
          if (tryStart() || n > 200) {
            clearInterval(t);
            if (n > 200) {
              if (typeof window.map_ndvi !== 'function') {
                console.error(
                  '[GENIUS bootExplorer] No se registró map_ndvi. Revisa consola/red (404 de módulos .js o CDN).'
                );
              } else if (typeof window.text_ndvi !== 'function') {
                console.error(
                  '[GENIUS bootExplorer] No se cargaron textos (text_ndvi). Revisa red o index2-explorer-text.js / text.js.'
                );
              }
            }
          }
        }, 50);
      }
      window.addEventListener('genius-explorer-maps-ready', function () {
        tryStart();
      });
      window.addEventListener('genius-explorer-text-ready', function () {
        tryStart();
      });
      window.addEventListener('load', function () {
        if (tryStart()) return;
        scheduleFallbackPoll();
      });
    })();
  </script>

          if (!op) continue;
          var host = tip.parentElement;
          if (!host || !host.classList.contains('chart-container')) continue;
          var r = host.getBoundingClientRect();
          tip.style.position = 'absolute';
          tip.style.left = (ev.clientX - r.left + 15) + 'px';
          tip.style.top = (ev.clientY - r.top - 15) + 'px';
        }
      }
      document.addEventListener('mousemove', repositionVisibleChartTooltips);
    })();
  </script>

  <script>
  (function () {
    function onTourTriggerClick() {
      queueMicrotask(function () {
        if (typeof window.__geniusStartExplorerTour === "function") return;
        var isFile = window.location && window.location.protocol === "file:";
        var msg = isFile
          ? "El recorrido guiado no puede cargarse al abrir la página como archivo (file://).\n\nSirve la carpeta del proyecto con un servidor local, por ejemplo:\n\n  python3 -m http.server\n\ny entra a http://localhost:8000/index2.html (ajusta el puerto si hace falta)."
          : "No se cargó el script del recorrido guiado. Abre la consola del navegador (F12 → Consola) y revisa errores en rojo (red, sintaxis, etc.).";
        console.warn("[GENIUS] Recorrido guiado:", msg);
        window.alert(msg);
      });
    }
    function bind() {
      var btn = document.getElementById("geTourTrigger");
      if (!btn || btn.dataset.geTourFallbackBound === "1") return;
      btn.dataset.geTourFallbackBound = "1";
      btn.addEventListener("click", onTourTriggerClick);
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bind, { once: true });
    } else {
      bind();
    }
  })();
  </script>
